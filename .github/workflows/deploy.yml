name: Deploy Web Frontend
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: SSH Deploy
      uses: appleboy/ssh-action@master
      with:
        host: 91.98.150.199
        username: root
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /opt/itv-deploy/web
          git pull
          npm install
          npm run build
          cd /opt/itv-deploy
          docker compose restart nginx
